# ============================================
# CI Pipeline - Aegis DevSecOps Platform
# ============================================
# This pipeline runs on every push and pull request.
# It ensures code quality, security, and correctness
# BEFORE changes reach the main branch.
#
# Pipeline Stages:
# 1. Lint & Format Check
# 2. Unit Tests
# 3. Security Scan
# 4. Docker Build (validates Dockerfile)
# ============================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
# WHY: Saves CI minutes and prevents queue buildup
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: aegis-api

jobs:
  # ---------- Stage 1: Code Quality ----------
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install flake8 mypy black isort

      - name: Check formatting (Black)
        run: black --check --line-length 100 apps/api/

      - name: Check import sorting (isort)
        run: isort --check-only --profile black apps/api/

      - name: Lint (Flake8)
        run: flake8 apps/api/ --max-line-length=100 --exclude=__pycache__

  # ---------- Stage 2: Tests ----------
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run tests with coverage
        run: |
          cd apps/api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage.xml

  # ---------- Stage 3: Security ----------
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "table"

  # ---------- Stage 4: Docker Build ----------
  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "table"
