# ============================================
# Security Scanning Pipeline
# ============================================
# Runs security checks on a schedule and on PRs.
# This catches vulnerabilities in dependencies
# even when no code changes are being made.
#
# WHY SCHEDULED SCANS?
# New CVEs are published daily. A dependency that
# was safe yesterday might have a critical vuln today.
# ============================================

name: Security Scan

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  dependency-scan:
    name: "🔒 Dependency Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  secret-scan:
    name: "🔑 Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
